<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotating Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hud">
    <p class="hud__instructions">Click as fast as you can to spin it up!</p>
    <div class="meter">
      <div class="meter__fill" id="meter-fill"></div>
    </div>
    <p class="hud__stat" id="cps-readout">0.0 clicks/sec</p>
  </div>

  <div class="explosion" id="explosion"></div>

  <div class="win-banner" id="win-banner">Congrats, you've destroyed everything! 💥</div>

  <div class="reload-control" id="reload-control">
    <button class="reload-control__button" id="reload-button" type="button">🔧</button>
    <p class="reload-control__caption">Redeem yourself</p>
  </div>

  <div class="faster-prompts" id="faster-prompts"></div>

  <div class="container" id="container">
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
