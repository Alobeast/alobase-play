<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alobase Play</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d10;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    main {
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }

    p.tagline {
      margin: 0 0 2rem;
      color: #8a8a92;
      font-size: 0.95rem;
    }

    ul.game-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    ul.game-list li a {
      display: block;
      padding: 0.9rem 1.1rem;
      border: 1px solid #232329;
      border-radius: 10px;
      color: #e8e8ea;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      background: #16161a;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    ul.game-list li a:hover,
    ul.game-list li a:focus-visible {
      border-color: #3a3a44;
      background: #1c1c22;
    }

    footer {
      margin-top: 2.5rem;
      color: #55555e;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Alobase Play</h1>
    <p class="tagline">A small collection of games.</p>
    <ul class="game-list">
      <li><a href="./spin/">Spin</a></li>
    </ul>
    <footer>play.alobase.dev</footer>
  </main>
</body>
</html>
